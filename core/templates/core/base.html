{% load static %}
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css">
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/css/bootstrap.min.css"
        integrity="sha384-TX8t27EcRE3e/ihU7zmQxVncDAy5uIKz4rEkgIXeMed4M0jlfIDPvg6uqKI2xXr2" crossorigin="anonymous">
    <link href="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/css/bootstrap.min.css" rel="stylesheet" id="bootstrap-css">
    <link rel="stylesheet" href="{% static 'css/body.css' %}">

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.1.0/jquery.min.js"></script>
    <script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
    
    <script src="//maxcdn.bootstrapcdn.com/bootstrap/4.1.1/js/bootstrap.min.js"></script>
    <script src="//cdnjs.cloudflare.com/ajax/libs/jquery/3.2.1/jquery.min.js"></script>


    <script src="https://cdn.jsdelivr.net/npm/bootstrap@4.5.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-ho+j7jyWK8fNQe+A12Hb8AhRq26LrZ/JpcUGGOn+Y7RsweNrtN/tE3MoK7ZeZDyx"
        crossorigin="anonymous"></script>

    <title>Attendio — Smart Attendance Kiosk</title>
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-brand">
                <i class="fas fa-fingerprint text-primary" style="font-size: 26px;"></i>
                <span style="font-family: var(--font-heading); font-weight: 800; letter-spacing: -0.5px;">Attend<span style="color: var(--primary-color)">io</span></span>
            </div>

            
            <ul class="sidebar-menu">
                <li>
                    <a href="{% url 'index' %}" class="sidebar-link {% if request.resolver_match.url_name == 'index' or request.resolver_match.url_name == 'details' %}active{% endif %}">
                        <i class="fas fa-th-large"></i>
                        <span>Dashboard</span>
                    </a>
                </li>
                <li>
                    <a href="{% url 'profiles' %}" class="sidebar-link {% if request.resolver_match.url_name == 'profiles' or request.resolver_match.url_name == 'add_profile' or request.resolver_match.url_name == 'edit_profile' or request.resolver_match.url_name == 'profile_detail' %}active{% endif %}">
                        <i class="fas fa-user-friends"></i>
                        <span>Employees</span>
                    </a>
                </li>
                <li>
                    <a href="{% url 'schedules' %}" class="sidebar-link {% if request.resolver_match.url_name == 'schedules' or request.resolver_match.url_name == 'add_schedule' or request.resolver_match.url_name == 'edit_schedule' or request.resolver_match.url_name == 'add_subject' %}active{% endif %}">
                        <i class="fas fa-clock"></i>
                        <span>Schedules</span>
                    </a>
                </li>
                <li>
                    <a href="{% url 'attendance_report' %}" class="sidebar-link {% if request.resolver_match.url_name == 'attendance_report' %}active{% endif %}">
                        <i class="fas fa-file-alt"></i>
                        <span>Reports</span>
                    </a>
                </li>
            </ul>
            
            <div class="sidebar-footer">
                <hr style="border-top: 1px solid #1e293b; margin: 12px 0;">
                <a href="{% url 'reset' %}" class="sidebar-link text-warning" onclick="return confirm('Are you sure you want to reset today\'s attendance status for all employees?');">
                    <i class="fas fa-undo-alt"></i>
                    <span>Reset Today</span>
                </a>
            </div>
        </aside>
        
        <!-- Main Content Wrapper -->
        <main class="main-wrapper">
            {% block content %}
            {% endblock content %}
        </main>
    </div>
</body>

</html>
